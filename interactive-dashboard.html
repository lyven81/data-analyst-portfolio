// Dynamic extraction of Interactive Dashboard case studies from main database
function getInteractiveDashboards() {
    return caseStudies.filter(study => study.category === "Interactive Dashboards");
}

// Sorting state
let currentSort = 'alphabetical'; // default to alphabetical as requested

// Search functionality
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const searchOverlay = document.getElementById('searchOverlay');

function performSearch(query) {
    if (query.length < 2) {
        searchResults.style.display = 'none';
        searchOverlay.style.display = 'none';
        return;
    }

    const filteredResults = caseStudies.filter(study =>
        study.title.toLowerCase().includes(query.toLowerCase()) ||
        study.description.toLowerCase().includes(query.toLowerCase()) ||
        study.category.toLowerCase().includes(query.toLowerCase())
    );

    displayResults(filteredResults);
}

function displayResults(results) {
    if (results.length === 0) {
        searchResults.innerHTML = '<div class="no-results">No case studies found. Try different keywords.</div>';
    } else {
        searchResults.innerHTML = results.map(study => `
            <div class="search-result-item">
                <div class="search-result-category">${study.category}</div>
                <div class="search-result-title">${study.title}</div>
                <div class="search-result-description">${study.description}</div>
                <div class="search-result-buttons">
                    <a href="${study.caseStudyUrl}" class="search-result-btn">Read More</a>
                    <a href="${study.dashboardUrl}" class="search-result-btn">View Dashboard</a>
                    ${study.agenticUrl ? `<a href="${study.agenticUrl}" class="search-result-btn">AI Assistant</a>` : ''}
                </div>
            </div>
        `).join('');
    }

    searchResults.style.display = 'block';
    searchOverlay.style.display = 'block';
}

function hideResults() {
    searchResults.style.display = 'none';
    searchOverlay.style.display = 'none';
}

// Event listeners
searchInput.addEventListener('input', (e) => {
    performSearch(e.target.value);
});

searchInput.addEventListener('focus', () => {
    if (searchInput.value.length >= 2) {
        performSearch(searchInput.value);
    }
});

// Hide results when clicking outside
searchOverlay.addEventListener('click', hideResults);

document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-container')) {
        hideResults();
    }
});

// Prevent search results from closing when clicked
searchResults.addEventListener('click', (e) => {
    e.stopPropagation();
});

// Handle escape key
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        hideResults();
        searchInput.blur();
    }
});

// Sorting functions
function sortCaseStudies(studies, sortType) {
    const sorted = [...studies];

    if (sortType === 'alphabetical') {
        return sorted.sort((a, b) => a.title.localeCompare(b.title));
    } else if (sortType === 'latest') {
        return sorted.sort((a, b) => {
            // Studies with dates (new) come first, sorted newest to oldest
            // Studies without dates (existing) maintain their order after dated ones
            if (!a.date && !b.date) return 0; // maintain original order for existing studies
            if (!a.date) return 1; // existing studies go to bottom
            if (!b.date) return -1; // new studies stay at top
            return new Date(b.date) - new Date(a.date); // newest first among dated studies
        });
    } else if (sortType === 'oldest') {
        return sorted.sort((a, b) => {
            // Studies with dates (new) come last, sorted oldest to newest
            // Studies without dates (existing) maintain their order before dated ones
            if (!a.date && !b.date) return 0; // maintain original order for existing studies
            if (!a.date) return -1; // existing studies stay at top
            if (!b.date) return 1; // new studies go to bottom
            return new Date(a.date) - new Date(b.date); // oldest first among dated studies
        });
    }

    return sorted;
}

const PER_PAGE = 8;
let currentPage = 1;

function renderTable(studies) {
    const table = document.getElementById('caseStudiesTable');
    // Sort alphabetically, then paginate
    const sortedStudies = [...studies].sort((a, b) => a.title.localeCompare(b.title));
    const totalPages = Math.max(1, Math.ceil(sortedStudies.length / PER_PAGE));
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    const startIdx = (currentPage - 1) * PER_PAGE;
    const pageStudies = sortedStudies.slice(startIdx, startIdx + PER_PAGE);

    let html = '';

    // Add case study rows
    for (let i = 0; i < pageStudies.length; i += 2) {
        html += '<tr>';

        // Left column
        const leftStudy = pageStudies[i];
        html += `
            <td>
                ${leftStudy.dateDisplay ? `<div class="case-study-date">${leftStudy.dateDisplay}</div>` : ''}
                <h3><a href="${leftStudy.caseStudyUrl}">${leftStudy.title}</a></h3>
                <p>${leftStudy.description}</p>
                <div class="case-study-links">
                    <a href="${leftStudy.dashboardUrl}">View Dashboard</a>
                    ${leftStudy.agenticUrl ? `<a href="${leftStudy.agenticUrl}">AI Assistant</a>` : ''}
                </div>
            </td>
        `;

        // Right column (if exists)
        if (i + 1 < pageStudies.length) {
            const rightStudy = pageStudies[i + 1];
            html += `
                <td>
                    ${rightStudy.dateDisplay ? `<div class="case-study-date">${rightStudy.dateDisplay}</div>` : ''}
                    <h3><a href="${rightStudy.caseStudyUrl}">${rightStudy.title}</a></h3>
                    <p>${rightStudy.description}</p>
                    <div class="case-study-links">
                        <a href="${rightStudy.dashboardUrl}">View Dashboard</a>
                        ${rightStudy.agenticUrl ? `<a href="${rightStudy.agenticUrl}">AI Assistant</a>` : ''}
                    </div>
                </td>
            `;
        } else {
            html += '<td></td>'; // Empty cell if odd number of studies
        }

        html += '</tr>';
    }

    table.innerHTML = html;
    renderPagination(totalPages, sortedStudies.length);
}

function renderPagination(totalPages, totalCount) {
    let el = document.getElementById('pagination');
    if (!el) {
        el = document.createElement('div');
        el.id = 'pagination';
        el.className = 'pagination';
        document.getElementById('caseStudiesTable').insertAdjacentElement('afterend', el);
    }
    let info = document.getElementById('page-info');
    if (!info) {
        info = document.createElement('div');
        info.id = 'page-info';
        info.className = 'page-info';
        el.insertAdjacentElement('afterend', info);
    }
    if (totalPages <= 1) { el.innerHTML = ''; info.textContent = totalCount + ' dashboards'; return; }
    let h = '<button class="page-link" ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage - 1) + ')">Prev</button>';
    for (let p = 1; p <= totalPages; p++) {
        h += '<button class="page-link ' + (p === currentPage ? 'active' : '') + '" onclick="goToPage(' + p + ')">' + p + '</button>';
    }
    h += '<button class="page-link" ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage + 1) + ')">Next</button>';
    el.innerHTML = h;
    const from = (currentPage - 1) * PER_PAGE + 1;
    const to = Math.min(currentPage * PER_PAGE, totalCount);
    info.textContent = 'Showing ' + from + '-' + to + ' of ' + totalCount + ' dashboards';
}

function goToPage(p) {
    currentPage = p;
    renderTable(getInteractiveDashboards());
    document.getElementById('caseStudiesTable').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function changeSortType(sortType) {
    currentSort = sortType;
    currentPage = 1;
    renderTable(getInteractiveDashboards());
}

// Initialize page with default alphabetical sorting
document.addEventListener('DOMContentLoaded', function() {
    renderTable(getInteractiveDashboards());
});
