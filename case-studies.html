<head>

<title>Case Studies | Data Stories Lab</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{ --ink:#222; --paper:#fff; --rule:#222; --hair:#dddddd; --gray:#555; --accent:#B8860B; --gold:#daa520; --cream:#f5f5dc; }
  html{ scroll-behavior:smooth; }
  body{ background:var(--paper); color:var(--ink); font-family:Arial, Helvetica, sans-serif; line-height:1.6; overflow-x:hidden; }
  a{ color:inherit; text-decoration:none; }
  a:hover h2, a:hover h3, a:hover h4{ color:var(--accent); }

  /* Masthead (shared with index) */
  .masthead{ display:flex; align-items:center; justify-content:space-between; padding:14px 28px; max-width:90%; margin:0 auto; gap:18px; }
  .mast-left{ display:flex; align-items:center; gap:20px; }
  .logo{ background:#222; color:#fff; font-family:Arial, Helvetica, sans-serif; font-weight:700; letter-spacing:3px; font-size:.95rem; padding:8px 12px; white-space:nowrap; }
  .mast-nav{ display:flex; gap:20px; font-family:Arial, Helvetica, sans-serif; font-size:.72rem; letter-spacing:1.4px; text-transform:uppercase; }
  .mast-nav a:hover{ color:var(--accent); }
  .hamburger{ display:none; flex-direction:column; gap:4px; background:none; border:none; cursor:pointer; padding:6px; }
  .hamburger span{ width:22px; height:2px; background:#222; display:block; }
  .rule-top{ border:none; border-top:3px solid var(--rule); max-width:90%; margin:0 auto; }

  /* Search (shared) */
  .search-box{ position:relative; width:200px; }
  .search-input{ width:100%; padding:7px 30px 7px 12px; border:1px solid var(--hair); background:#fff; font-family:Arial, Helvetica, sans-serif; font-size:.8rem; color:#222; }
  .search-input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(184,134,11,.15); }
  .search-ic{ position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--gray); font-size:.8rem; pointer-events:none; }
  .search-results{ position:absolute; top:calc(100% + 4px); left:0; width:340px; max-width:86vw; background:#fff; border:1px solid #222; max-height:60vh; overflow-y:auto; z-index:120; display:none; }
  .sr-item{ padding:12px 14px; border-bottom:1px solid var(--hair); }
  .sr-item:last-child{ border-bottom:none; }
  .sr-cat{ font-size:.6rem; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; margin-bottom:4px; color:var(--accent); }
  .sr-title{ font-weight:700; font-size:1.02rem; color:#222; }
  .sr-links{ font-size:.58rem; letter-spacing:.8px; text-transform:uppercase; color:var(--gray); margin-top:5px; }
  .sr-links a:hover{ color:var(--accent); }
  .sr-none{ padding:16px 14px; font-size:.82rem; color:var(--gray); }

  /* Shared type bits */
  .tab{ display:inline-block; background:#222; color:#fff; font-family:Arial, Helvetica, sans-serif; font-weight:700; font-size:.66rem; letter-spacing:2px; text-transform:uppercase; padding:6px 12px; }
  .rubric{ font-family:Arial, Helvetica, sans-serif; font-size:.62rem; font-weight:700; letter-spacing:1.6px; text-transform:uppercase; color:var(--accent); display:block; margin-bottom:6px; }
  .links{ font-family:Arial, Helvetica, sans-serif; font-size:.58rem; letter-spacing:1px; text-transform:uppercase; margin-top:8px; color:var(--gray); }
  .links a:hover{ color:var(--accent); }
  .lead-dek{ font-style:italic; color:#333; }
  .viz{ display:flex; align-items:center; justify-content:center; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.3); line-height:1; }

  /* Page head */
  .page-head{ max-width:90%; margin:0 auto; padding:28px 28px 6px; }
  .page-head .tab{ margin-bottom:14px; }
  .page-head h1{ font-size:2.6rem; font-weight:900; line-height:1.04; letter-spacing:-.005em; }
  .page-head p{ color:var(--gray); max-width:74ch; margin-top:10px; }

  /* ===== CONTENTS BAND (numbered table of contents) ===== */
  .contents{ max-width:90%; margin:0 auto; padding:14px 28px 30px; }
  .contents .tab{ margin-bottom:16px; }
  .contents-grid{ display:grid; grid-template-columns:repeat(3,1fr); border-top:1px solid var(--hair); }
  .toc-item{ display:flex; gap:13px; align-items:flex-start; padding:16px 18px; border-right:1px solid var(--hair); border-bottom:1px solid var(--hair); }
  .toc-item:nth-child(3n){ border-right:none; }
  .toc-item:nth-last-child(-n+3){ border-bottom:none; }
  .toc-num{ font-weight:900; font-size:1.15rem; color:var(--accent); line-height:1; min-width:26px; }
  .toc-name{ font-size:1rem; font-weight:700; line-height:1.14; }
  .toc-meta{ font-size:.58rem; letter-spacing:1px; text-transform:uppercase; color:var(--gray); margin-top:5px; }
  .toc-item:hover .toc-name{ color:var(--accent); }

  /* ===== DEPARTMENTS (lead + rail per category, stacked) ===== */
  .dept{ max-width:90%; margin:0 auto; padding:4px 28px 40px; scroll-margin-top:20px; }
  .dept-masthead{ display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; border-top:3px solid var(--rule); padding-top:14px; }
  .dept-masthead h2{ font-size:1.85rem; font-weight:900; line-height:1.05; }
  .dept-count{ font-size:.62rem; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:var(--accent); }
  .dept-masthead .view-all{ margin-left:auto; font-size:.62rem; letter-spacing:1px; text-transform:uppercase; color:var(--accent); white-space:nowrap; }
  .dept-desc{ color:var(--gray); font-size:.95rem; margin:10px 0 4px; max-width:84ch; }

  .dept-body{ display:grid; grid-template-columns:1.45fr 1fr; margin-top:18px; }

  /* Lead feature */
  .lead{ display:flex; flex-direction:column; padding-right:34px; }
  .lead-cover{ display:block; min-height:300px; flex:1; margin-bottom:15px;
               background:#eee center/cover no-repeat; border:1px solid var(--hair); }
  .lead h3{ font-size:2rem; font-weight:800; line-height:1.06; letter-spacing:-.005em; }
  .lead .lead-dek{ font-size:1.05rem; margin-top:8px; max-width:46ch; }

  /* Rail */
  .rail{ padding-left:34px; border-left:1px solid var(--hair); display:flex; flex-direction:column; }
  .rail-head{ font-size:.6rem; font-weight:700; letter-spacing:1.6px; text-transform:uppercase; color:var(--gray); padding-bottom:14px; border-bottom:1px solid var(--hair); }
  .rail-item{ display:flex; gap:14px; padding:16px 0; border-bottom:1px solid var(--hair); }
  .rail-item:last-of-type{ border-bottom:none; }
  .rail-thumb{ width:66px; height:66px; flex:none; background:#eee center/cover no-repeat; border:1px solid var(--hair); }
  .rail-text h4{ font-size:1.06rem; font-weight:700; line-height:1.16; }
  .rail-text .lead-dek{ font-size:.86rem; margin-top:4px; }
  .rail-empty{ padding:16px 0; color:var(--gray); font-size:.86rem; }

  footer{ background:#222; max-width:90%; margin:30px auto 0; padding:24px 28px; font-family:Arial, Helvetica, sans-serif; font-size:.8rem; letter-spacing:.5px; color:#fff; text-align:center; }
  .note{ max-width:90%; margin:14px auto 0; padding:8px 28px; font-family:Arial, Helvetica, sans-serif; font-size:.62rem; letter-spacing:1px; color:#999; }

  /* Drawer (shared) */
  .drawer{ position:fixed; top:0; left:-300px; width:280px; height:100vh; background:#fff; z-index:200; box-shadow:2px 0 14px rgba(0,0,0,.15); transition:left .28s ease; padding:74px 26px 26px; }
  .drawer.open{ left:0; }
  .drawer a{ display:block; font-family:Arial, Helvetica, sans-serif; font-size:.82rem; letter-spacing:1.2px; text-transform:uppercase; padding:14px 0; border-bottom:1px solid var(--hair); }
  .overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:150; }
  .overlay.open{ display:block; }
  .drawer-close{ position:absolute; top:20px; right:20px; font-family:Arial, Helvetica, sans-serif; font-size:1.4rem; background:none; border:none; cursor:pointer; }

  @media (max-width:1000px){
    .contents-grid{ grid-template-columns:repeat(2,1fr); }
    .toc-item:nth-child(3n){ border-right:1px solid var(--hair); }
    .toc-item:nth-child(2n){ border-right:none; }
    .toc-item:nth-last-child(-n+3){ border-bottom:1px solid var(--hair); }
    .toc-item:nth-last-child(-n+2){ border-bottom:none; }
  }
  @media (max-width:900px){
    .dept-body{ grid-template-columns:1fr; }
    .lead{ padding-right:0; }
    .lead-cover{ min-height:240px; }
    .rail{ padding-left:0; border-left:none; border-top:1px solid var(--hair); margin-top:24px; padding-top:18px; }
    .rail-head{ display:none; }
    .mast-nav{ display:none; }
    .hamburger{ display:flex; }
    .masthead{ padding:12px 16px; }
    .mast-left{ gap:10px; min-width:0; flex:1; }
    .logo{ font-size:.72rem; letter-spacing:1.5px; padding:6px 8px; }
    .search-box{ flex:1; width:auto; min-width:0; }
    .search-results{ position:fixed; top:58px; left:12px; right:12px; width:auto; max-width:none; }
    .page-head h1{ font-size:2rem; }
    .lead h3{ font-size:1.6rem; }
  }
  @media (max-width:560px){
    .contents-grid{ grid-template-columns:1fr; }
    .toc-item{ border-right:none !important; }
  }
</style>

ortfolio/agentic_workflow/where-revenue-comes-from.html", "img": "https://raw.githubusercontent.com/lyven81/data-analyst-portfolio/main/images/where-revenue-comes-from/cover%20image.png", "date": "2025-12-09"}, {"name": "Predicting Gym Member Drop-Off", "desc": "Spot gym members losing motivation before they quit", "cs": "/data-analyst-portfolio/case-studies/predicting-gym-member-dropout.html", "dash": "/data-analyst-portfolio/dashboards/predicting-gym-member-dropout-dashboard.html", "ai": "/data-analyst-portfolio/agentic_workflow/predicting-gym-member-dropout.html", "img": "https://raw.githubusercontent.com/lyven81/data-analyst-portfolio/main/images/predicting-gym-member-dropout/cover%20image.png", "date": "2025-12-01"}, {"name": "Who Is Most at Risk of Leaving the Bank", "desc": "Know which bank customers may leave next", "cs": "/data-analyst-portfolio/case-studies/who-is-most-at-risk-of-leaving-the-bank.html", "dash": "", "ai": "", "img": "https://raw.githubusercontent.com/lyven81/data-analyst-portfolio/main/images/who-is-most-at-risk-of-leaving-the-bank/cover%20image.png", "date": "2025-09-29"}, {"name": "Flagging High-Risk Borrowers", "desc": "Flag risky loan applicants before you approve them", "cs": "/data-analyst-portfolio/case-studies/flagging-high-risk-customer.html", "dash": "/data-analyst-portfolio/dashboards/flagging-high-risk-customer-dashboard.html", "ai": "", "img": "https://raw.githubusercontent.com/lyven81/data-analyst-portfolio/main/images/flagging-high-risk-borrowers/cover%20image.png", "date": "2025-05-13"}, {"name": "Predicting Depression Risk in Students", "desc": "Spot students at risk of depression early", "cs": "/data-analyst-portfolio/case-studies/predicting-depression-risk-student.html", "dash": "", "ai": "", "img": "https://raw.githubusercontent.com/lyven81/data-analyst-portfolio/main/images/predicting-student-depressiion-risk/cover%20image.png", "date": "2025-05-04"}, {"name": "Identifying At-Risk Students Early", "desc": "Catch struggling students early enough to help", "cs": "/data-analyst-portfolio/case-studies/identify-at-risk-student.html", "dash": "", "ai": "", "img": "https://raw.githubusercontent.com/lyven81/data-analyst-portfolio/main/images/identify-at-risk-student/cover%20image.png", "date": "2025-05-02"}]}];
  const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const pad2 = (n) => String(n).padStart(2,'0');
  const linkRow = (p) =>
    `<div class="links"><a href="${p.cs}">Read</a>`+
    `${p.dash ? ` &middot; <a href="${p.dash}">Dashboard</a>` : ``}`+
    `${p.ai ? ` &middot; <a href="${p.ai}">AI Assistant</a>` : ``}</div>`;

  document.getElementById('tocGrid').innerHTML = CATS.map((cat,i) => `
    <a class="toc-item" href="#cat-${i}">
      <span class="toc-num">${pad2(i+1)}</span>
      <span>
        <span class="toc-name">${cat.heading}</span>
        <span class="toc-meta">${cat.projects.length} case ${cat.projects.length===1?'study':'studies'} &rarr;</span>
      </span>
    </a>`).join('');

  document.getElementById('depts').innerHTML = CATS.map((cat,i) => {
    const lead = cat.projects[0];
    const rail = cat.projects.slice(1, 5);   // next 4 latest beside the hero
    const leadHtml = `
      <div class="lead">
        <a class="lead-cover" href="${lead.cs}" style="background-image:url('${lead.img}')" aria-label="${esc(lead.name)}"></a>
        <span class="rubric">${cat.heading}</span>
        <a href="${lead.cs}"><h3>${esc(lead.name)}</h3></a>
        <p class="lead-dek">${esc(lead.desc)}</p>
        ${linkRow(lead)}
      </div>`;
    const railHtml = `
      <div class="rail">
        <div class="rail-head">More in ${cat.heading}</div>
        ${rail.map(p => `
          <article class="rail-item">
            <a class="rail-thumb" href="${p.cs}" style="background-image:url('${p.img}')" aria-label="${esc(p.name)}"></a>
            <div class="rail-text">
              <a href="${p.cs}"><h4>${esc(p.name)}</h4></a>
              <p class="lead-dek">${esc(p.desc)}</p>
              ${linkRow(p)}
            </div>
          </article>`).join('')}
      </div>`;
    return `
      <section class="dept" id="cat-${i}">
        <div class="dept-masthead">
          <h2>${cat.heading}</h2>
          <span class="dept-count">${cat.projects.length} case ${cat.projects.length===1?'study':'studies'}</span>
          <a class="view-all" href="${cat.viewAll}">View all &rarr;</a>
        </div>
        <p class="dept-desc">${esc(cat.desc)}</p>
        <div class="dept-body">${leadHtml}${railHtml}</div>
      </section>`;
  }).join('');

  const ALL = CATS.flatMap(c => c.projects.map(p => ({...p, cat:c.heading})));
  const searchInput=document.getElementById('searchInput'), searchResults=document.getElementById('searchResults');
  function runSearch(q){
    if(q.trim().length<2){ searchResults.style.display='none'; return; }
    const ql=q.toLowerCase();
    const hits=ALL.filter(p => (p.name+' '+p.cat+' '+p.desc).toLowerCase().includes(ql));
    searchResults.innerHTML = hits.length ? hits.map(p =>
      `<div class="sr-item"><div class="sr-cat">${esc(p.cat)}</div>`+
      `<a href="${p.cs}"><div class="sr-title">${esc(p.name)}</div></a>`+
      `<div class="sr-links"><a href="${p.cs}">Read</a>`+
      `${p.dash ? ` &middot; <a href="${p.dash}">Dashboard</a>` : ``}`+
      `${p.ai ? ` &middot; <a href="${p.ai}">AI Assistant</a>` : ``}</div></div>`).join('')
      : `<div class="sr-none">No case studies found. Try a different keyword.</div>`;
    searchResults.style.display='block';
  }
  searchInput.addEventListener('input', e => runSearch(e.target.value));
  document.addEventListener('click', e => { if(!e.target.closest('.search-box')) searchResults.style.display='none'; });

  const drawer=document.getElementById('drawer'), overlay=document.getElementById('overlay');
  const openMenu=()=>{ drawer.classList.add('open'); overlay.classList.add('open'); };
  const closeMenu=()=>{ drawer.classList.remove('open'); overlay.classList.remove('open'); };
  document.getElementById('hamburger').addEventListener('click', openMenu);
  document.getElementById('drawerClose').addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);
  drawer.querySelectorAll('a').forEach(a=>a.addEventListener('click', closeMenu));
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeMenu(); searchResults.style.display='none'; }});
</script>
</body>
</html>
