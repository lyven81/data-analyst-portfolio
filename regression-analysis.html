  const ALL = MASTER.filter(p => p.cat === CATEGORY);
  const PER = 8;                                  // 2 columns x 4 rows
  const pages = Math.max(1, Math.ceil(ALL.length / PER));
  let page = 1;
  const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  document.getElementById('crumbHere').textContent = CATEGORY;
  document.getElementById('catTitle').textContent = CATEGORY;
  document.getElementById('catSub').textContent = SUBTITLES[CATEGORY] || '';
  document.title = CATEGORY + ' | Data Stories Lab';

  const grid = document.getElementById('grid');
  const linkRow = (p) => {
    let l = [`<a href="${p.cs}">Case Study</a>`, `<a href="${p.dash}">Dashboard</a>`];
    if(p.ai) l.push(`<a href="${p.ai}">AI Assistant</a>`);
    return l.join(' &middot; ');
  };
  const card = (p) =>
    `<article class="card">`+
      `<a href="${p.cs}"><h3>${esc(p.name)}</h3></a>`+
      `<p>${esc(p.desc)}</p>`+
      `<div class="links">${linkRow(p)}</div>`+
    `</article>`;

  function pagerNums(){
    const out=[];
    if(pages<=7){ for(let i=1;i<=pages;i++) out.push(i); return out; }
    out.push(1);
    let lo=Math.max(2,page-1), hi=Math.min(pages-1,page+1);
    if(lo>2) out.push('...');
    for(let i=lo;i<=hi;i++) out.push(i);
    if(hi<pages-1) out.push('...');
    out.push(pages);
    return out;
  }
  function render(){
    const start=(page-1)*PER, slice=ALL.slice(start,start+PER);
    grid.innerHTML = slice.map(card).join('');
    document.getElementById('pgNums').innerHTML = pagerNums().map(n =>
      n==='...' ? `<span class="pg-ellipsis">&hellip;</span>`
                : `<button class="pg-num${n===page?' active':''}" data-p="${n}">${n}</button>`).join('');
    document.getElementById('prev').disabled = page===1;
    document.getElementById('next').disabled = page===pages;
    const end=Math.min(start+PER, ALL.length);
    document.getElementById('pgInfo').textContent =
      `Showing ${ALL.length?start+1:0}\u2013${end} of ${ALL.length} case ${ALL.length===1?'study':'studies'}`;
  }
  function go(n){ page=Math.min(Math.max(1,n),pages); render();
    document.querySelector('.listwrap').scrollIntoView({behavior:'smooth',block:'start'}); }
  document.getElementById('prev').onclick=()=>go(page-1);
  document.getElementById('next').onclick=()=>go(page+1);
  document.getElementById('pgNums').addEventListener('click',e=>{ const b=e.target.closest('.pg-num'); if(b) go(+b.dataset.p); });
  render();

  // search within this subcategory
  const searchInput=document.getElementById('searchInput'), searchResults=document.getElementById('searchResults');
  function runSearch(q){
    if(q.trim().length<2){ searchResults.style.display='none'; return; }
    const ql=q.toLowerCase();
    const hits=ALL.filter(p => (p.name+' '+p.desc).toLowerCase().includes(ql));
    searchResults.innerHTML = hits.length ? hits.map(p =>
      `<div class="sr-item"><a href="${p.cs}"><div class="sr-title">${esc(p.name)}</div></a>`+
      `<div class="sr-links">${linkRow(p)}</div></div>`).join('')
      : `<div class="sr-none">No case studies found in ${esc(CATEGORY)}.</div>`;
    searchResults.style.display='block';
  }
  searchInput.addEventListener('input', e => runSearch(e.target.value));
  document.addEventListener('click', e => { if(!e.target.closest('.search-box')) searchResults.style.display='none'; });

  const drawer=document.getElementById('drawer'), overlay=document.getElementById('overlay');
  const openMenu=()=>{ drawer.classList.add('open'); overlay.classList.add('open'); };
  const closeMenu=()=>{ drawer.classList.remove('open'); overlay.classList.remove('open'); };
  document.getElementById('hamburger').addEventListener('click', openMenu);
  document.getElementById('drawerClose').addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);
  drawer.querySelectorAll('a').forEach(a=>a.addEventListener('click', closeMenu));
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeMenu(); searchResults.style.display='none'; }});
</script>
