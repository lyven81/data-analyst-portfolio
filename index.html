  :root{ --ink:#222; --paper:#fff; --rule:#222; --hair:#dddddd; --gray:#555; --accent-link:#007BFF; --gold:#daa520; --cream:#f5f5dc; }
  body{ background:var(--paper); color:var(--ink); font-family:Arial, Helvetica, sans-serif; line-height:1.6; overflow-x:hidden; }
  a{ color:inherit; text-decoration:none; }
  a:hover h2, a:hover h3, a:hover h4{ color:var(--accent-link); }

  .masthead{ display:flex; align-items:center; justify-content:space-between; padding:14px 28px; max-width:1240px; margin:0 auto; gap:18px; }
  .mast-left{ display:flex; align-items:center; gap:20px; }
  .logo{ background:#222; color:#fff; font-family:Arial, Helvetica, sans-serif; font-weight:700; letter-spacing:3px; font-size:.95rem; padding:8px 12px; white-space:nowrap; }
  .mast-nav{ display:flex; gap:20px; font-family:Arial, Helvetica, sans-serif; font-size:.72rem; letter-spacing:1.4px; text-transform:uppercase; }
  .mast-nav a:hover{ color:var(--accent-link); }
  .hamburger{ display:none; flex-direction:column; gap:4px; background:none; border:none; cursor:pointer; padding:6px; }
  .hamburger span{ width:22px; height:2px; background:#222; display:block; }
  .rule-top{ border:none; border-top:3px solid var(--rule); max-width:1240px; margin:0 auto; }

  .search-box{ position:relative; width:200px; }
  .search-input{ width:100%; padding:7px 30px 7px 12px; border:1px solid var(--hair); background:#fff;
    font-family:Arial, Helvetica, sans-serif; font-size:.8rem; color:#222; }
  .search-input:focus{ outline:none; border-color:var(--accent-link); box-shadow:0 0 0 3px rgba(0,123,255,.12); }
  .search-ic{ position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--gray); font-size:.8rem; pointer-events:none; }
  .search-results{ position:absolute; top:calc(100% + 4px); left:0; width:340px; max-width:86vw; background:#fff; border:1px solid #222;
    max-height:60vh; overflow-y:auto; z-index:120; display:none; }
  .sr-item{ padding:12px 14px; border-bottom:1px solid var(--hair); }
  .sr-item:last-child{ border-bottom:none; }
  .sr-cat{ font-family:Arial, Helvetica, sans-serif; font-size:.6rem; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; margin-bottom:4px; color:var(--accent-link); }
  .sr-title{ font-weight:700; font-size:1.02rem; color:#222; }
  .sr-links{ font-family:Arial, Helvetica, sans-serif; font-size:.58rem; letter-spacing:.8px; text-transform:uppercase; color:var(--gray); margin-top:5px; }
  .sr-links a:hover{ color:var(--accent-link); }
  .sr-none{ padding:16px 14px; font-family:Arial, Helvetica, sans-serif; font-size:.82rem; color:var(--gray); }
  .rule-search{ border:none; border-top:1px solid var(--hair); max-width:1240px; margin:0 auto; }

  /* Mobile drawer */
  .drawer{ position:fixed; top:0; left:-300px; width:280px; height:100vh; background:#fff; z-index:200;
    box-shadow:2px 0 14px rgba(0,0,0,.15); transition:left .28s ease; padding:74px 26px 26px; }
  .drawer.open{ left:0; }
  .drawer a{ display:block; font-family:Arial, Helvetica, sans-serif; font-size:.82rem; letter-spacing:1.2px; text-transform:uppercase;
    padding:14px 0; border-bottom:1px solid var(--hair); }
  .overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:150; }
  .overlay.open{ display:block; }
  .drawer-close{ position:absolute; top:20px; right:20px; font-family:Arial, Helvetica, sans-serif; font-size:1.4rem; background:none; border:none; cursor:pointer; }

  /* Shared type bits */
  .tab{ display:inline-block; background:#222; color:#fff; font-family:Arial, Helvetica, sans-serif; font-weight:700;
    font-size:.66rem; letter-spacing:2px; text-transform:uppercase; padding:6px 12px; margin-bottom:18px; }
  .rubric{ font-family:Arial, Helvetica, sans-serif; font-size:.64rem; font-weight:700; letter-spacing:1.6px; text-transform:uppercase; margin-bottom:6px; display:block; }
  .byline{ font-family:Arial, Helvetica, sans-serif; font-size:.6rem; letter-spacing:1px; color:var(--gray); text-transform:uppercase; margin-top:8px; }
  .links{ font-family:Arial, Helvetica, sans-serif; font-size:.58rem; letter-spacing:1px; text-transform:uppercase; margin-top:8px; color:var(--gray); }
  .links a:hover{ color:var(--accent-link); }
  .lead-dek{ font-style:italic; font-size:1.05rem; color:#333; max-width:52ch; }

  /* ---------- UPPER BODY: 2 / 1 / 2 ---------- */
  .wrap{ max-width:1240px; margin:0 auto; padding:0 28px 10px; }
  .grid{ display:grid; grid-template-columns:300px 1fr 320px; }
  .col{ padding:24px 0; display:flex; flex-direction:column; }
  .col-left{ padding-right:26px; border-right:1px solid var(--hair); }
  .col-mid{ padding:24px 28px; }
  .col-right{ padding-left:26px; border-left:1px solid var(--hair); }
  .col-left #picks{ flex:1; display:flex; flex-direction:column; }
  .col-right #recent{ flex:1; display:flex; flex-direction:column; }

  /* Lead (center) — image grows so title/subheading/links sit flush at the bottom */
  .col-mid > a:first-child{ flex:1; display:block; min-height:300px; margin-bottom:16px; overflow:hidden; }
  .lead-img{ width:100%; height:100%; object-fit:cover; display:block; }
  .next-kicker{ font-family:Arial, Helvetica, sans-serif; font-weight:700; font-size:.7rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
  .lead-headline{ font-size:2.7rem; font-weight:900; line-height:1.02; text-transform:uppercase; letter-spacing:-.005em; margin-bottom:14px; }
  .col-mid .lead-dek{ margin-bottom:6px; }

  /* Left picks (2) — cover image on top; each grows equally */
  .pick{ flex:1; display:flex; flex-direction:column; padding:20px 0; border-bottom:1px solid var(--hair); }
  .pick:first-of-type{ padding-top:0; }
  .pick:last-child{ border-bottom:none; padding-bottom:0; }
  .pick > a:first-child{ flex:1; display:block; min-height:150px; margin-bottom:13px; overflow:hidden; }
  .pick > a:first-child img{ width:100%; height:100%; object-fit:cover; display:block; }
  .pick h3{ font-size:1.42rem; font-weight:700; line-height:1.08; }

  /* Right (2) — cover image on top of title + subheading; each grows to fill */
  .recent{ flex:1; display:flex; flex-direction:column; padding:18px 0; border-bottom:1px solid var(--hair); }
  .recent:first-of-type{ padding-top:0; }
  .recent:last-child{ border-bottom:none; padding-bottom:0; }
  .recent > a:first-child{ flex:1; display:block; min-height:110px; margin-bottom:11px; overflow:hidden; }
  .recent > a:first-child img{ width:100%; height:100%; object-fit:cover; display:block; }
  .recent h3{ font-size:1.18rem; font-weight:700; line-height:1.14; }
  .recent .lead-dek{ font-size:.92rem; margin-top:6px; }

  /* ---------- EXPLORE BY METHOD ---------- */
  .method{ max-width:1240px; margin:0 auto; padding:8px 28px 36px; }
  .method-grid{ display:grid; grid-template-columns:repeat(6,1fr); border-top:1px solid var(--hair); }
  .method-tile{ padding:18px 18px 22px; border-right:1px solid var(--hair); }
  .method-tile:last-child{ border-right:none; }
  .method-tile .rubric{ margin-bottom:10px; font-size:.54rem; letter-spacing:.3px; white-space:nowrap; }
  .method-tile h4{ font-size:1.18rem; font-weight:700; line-height:1.1; margin-bottom:8px; }
  .method-tile p{ font-family:Arial, Helvetica, sans-serif; font-size:.6rem; letter-spacing:.5px; line-height:1.5; color:var(--gray); margin-bottom:12px; }
  .method-tile .go{ font-family:Arial, Helvetica, sans-serif; font-size:.6rem; letter-spacing:1px; text-transform:uppercase; }
  .method-tile:hover h4{ color:var(--accent-link); }

  /* ---------- LOWER BODY: 2 x 2 cards ---------- */
  .lower{ max-width:1240px; margin:0 auto; padding:8px 28px 50px; }
  .lower-grid{ display:grid; grid-template-columns:1fr 1fr; border-top:3px solid var(--rule); }
  .lower-card{ padding:26px 0; border-bottom:1px solid var(--hair); }
  .lower-card:nth-child(odd){ border-right:1px solid var(--hair); padding-right:34px; }
  .lower-card:nth-child(even){ padding-left:34px; }
  .lower-card:nth-last-child(-n+2){ border-bottom:none; }
  .lower-card img{ width:100%; height:220px; object-fit:cover; display:block; margin-bottom:15px; }
  .lower-card h3{ font-size:1.7rem; font-weight:700; line-height:1.06; }
  .lower-card .lead-dek{ margin-top:8px; font-size:1rem; }

  footer{ background:#222; max-width:1240px; margin:0 auto; padding:24px 28px;
    font-family:Arial, Helvetica, sans-serif; font-size:.8rem; letter-spacing:.5px; color:#fff; text-align:center; }

  @media (max-width:1000px){
    .method-grid{ grid-template-columns:repeat(3,1fr); }
    .method-tile{ border-bottom:1px solid var(--hair); }
    .method-tile:nth-child(3n){ border-right:none; }
  }
  @media (max-width:900px){
    .grid{ grid-template-columns:1fr; }
    .col-left,.col-right{ border:none; padding:22px 0; border-top:1px solid var(--hair); }
    .col-mid{ padding:22px 0; }
    .lead-headline{ font-size:2rem; }
    .col-mid > a:first-child{ min-height:230px; }
    .mast-nav{ display:none; }
    .hamburger{ display:flex; }
    .masthead{ padding:12px 16px; }
    .mast-left{ gap:10px; min-width:0; flex:1; }
    .logo{ font-size:.72rem; letter-spacing:1.5px; padding:6px 8px; }
    /* search fills the space beside the logo; dropdown pins below the header */
    .search-box{ flex:1; width:auto; min-width:0; }
    .search-results{ position:fixed; top:58px; left:12px; right:12px; width:auto; max-width:none; }
    .lower-grid{ grid-template-columns:1fr; }
    .lower-card:nth-child(odd){ border-right:none; padding-right:0; }
    .lower-card:nth-child(even){ padding-left:0; }
    .lower-card{ border-bottom:1px solid var(--hair); }
    .lower-card:last-child{ border-bottom:none; }
  }
  @media (max-width:560px){
    .method-grid{ grid-template-columns:repeat(2,1fr); }
    .method-tile:nth-child(3n){ border-right:1px solid var(--hair); }
    .method-tile:nth-child(2n){ border-right:none; }
  }

    `<span class="rubric" style="color:${accent[it.c]}">${it.c}</span>`+
    `<a href="${SITE}case-studies/${it.s}.html"><h3>${it.t}</h3></a>`+
    `<p class="lead-dek">${it.dek}</p>`+
    `<div class="byline">By Lee Yih Ven</div>`+linkRow(it)+`</article>`).join('');

  // RIGHT items
  document.getElementById('recent').innerHTML = rightItems.map(it =>
    `<article class="recent">`+
    `<a href="${SITE}case-studies/${it.s}.html"><img src="${IMG}${it.img}" alt="${it.t}"></a>`+
    `<span class="rubric" style="color:${accent[it.c]}">${it.c}</span>`+
    `<a href="${SITE}case-studies/${it.s}.html"><h3>${it.t}</h3></a>`+
    `<p class="lead-dek">${it.dek}</p>`+
    `<div class="byline">By Lee Yih Ven</div>`+linkRow(it)+`</article>`).join('');

  // METHOD band
  document.getElementById('methodGrid').innerHTML = categories.map(cat =>
    `<a class="method-tile" href="${SITE}${cat.url}">`+
    `<span class="rubric" style="color:${accent[cat.c]}">${cat.c}</span>`+
    `<h4>${cat.c.replace(' Analysis','').replace(' Modeling','')}</h4>`+
    `<p>${cat.p}</p>`+
    `<span class="go">View all &rarr;</span></a>`).join('');

  // LOWER: 2 x 2, column-major fill (TL, BL, TR, BR)
  document.getElementById('lowerGrid').innerHTML = lowerOrder.map(it =>
    `<article class="lower-card">`+
    `<a href="${SITE}case-studies/${it.s}.html"><img src="${IMG}${it.img}" alt="${it.t}"></a>`+
    `<span class="rubric" style="color:${accent[it.c]}">${it.c}</span>`+
    `<a href="${SITE}case-studies/${it.s}.html"><h3>${it.t}</h3></a>`+
    `<p class="lead-dek">${it.dek}</p>`+
    `<div class="byline">By Lee Yih Ven</div>`+linkRow(it)+`</article>`).join('');

  // SEARCH (over the full caseStudies database)
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  function runSearch(q){
    if(q.trim().length < 2){ searchResults.style.display='none'; return; }
    const ql = q.toLowerCase();
    const hits = caseStudies.filter(s => (s.title+' '+s.description+' '+s.category).toLowerCase().includes(ql));
    searchResults.innerHTML = hits.length ? hits.map(s =>
      `<div class="sr-item">`+
      `<div class="sr-cat">${s.category}</div>`+
      `<a href="${s.caseStudyUrl}"><div class="sr-title">${s.title}</div></a>`+
      `<div class="sr-links"><a href="${s.caseStudyUrl}">Read</a> &middot; `+
      `<a href="${s.dashboardUrl}">Dashboard</a>`+
      `${s.agenticUrl ? ` &middot; <a href="${s.agenticUrl}">AI Assistant</a>` : ``}</div></div>`).join('')
      : `<div class="sr-none">No case studies found. Try a different keyword.</div>`;
    searchResults.style.display='block';
  }
  searchInput.addEventListener('input', e => runSearch(e.target.value));
  document.addEventListener('click', e => { if(!e.target.closest('.search-box')) searchResults.style.display='none'; });

  // HAMBURGER drawer
  const drawer=document.getElementById('drawer'), overlay=document.getElementById('overlay');
  const openMenu=()=>{ drawer.classList.add('open'); overlay.classList.add('open'); };
  const closeMenu=()=>{ drawer.classList.remove('open'); overlay.classList.remove('open'); };
  document.getElementById('hamburger').addEventListener('click', openMenu);
  document.getElementById('drawerClose').addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);
  drawer.querySelectorAll('a').forEach(a=>a.addEventListener('click', closeMenu));
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeMenu(); searchResults.style.display='none'; }});
</script>
</body>
</html>
