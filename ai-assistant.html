<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistants | Data Stories Lab</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{ --ink:#222; --paper:#fff; --hair:#dddddd; --gray:#555; --accent:#B8860B; --navy:#1E3A5F; --panel:#fbfbf8; }
  html{ scroll-behavior:smooth; }
  body{ background:var(--paper); color:var(--ink); font-family:Arial, Helvetica, sans-serif; line-height:1.6; overflow-x:hidden; }
  a{ color:inherit; text-decoration:none; }
  a:hover h3{ color:var(--accent); }

  .masthead{ display:flex; align-items:center; justify-content:space-between; padding:14px 28px; max-width:90%; margin:0 auto; gap:18px; }
  .mast-left{ display:flex; align-items:center; gap:20px; }
  .logo{ background:#222; color:#fff; font-weight:700; letter-spacing:3px; font-size:.95rem; padding:8px 12px; white-space:nowrap; }
  .mast-nav{ display:flex; gap:20px; font-size:.72rem; letter-spacing:1.4px; text-transform:uppercase; }
  .mast-nav a:hover{ color:var(--accent); }
  .hamburger{ display:none; flex-direction:column; gap:4px; background:none; border:none; cursor:pointer; padding:6px; }
  .hamburger span{ width:22px; height:2px; background:#222; display:block; }
  .rule-top{ border:none; border-top:3px solid #222; max-width:90%; margin:0 auto; }

  .search-box{ position:relative; width:200px; }
  .search-input{ width:100%; padding:7px 30px 7px 12px; border:1px solid var(--hair); background:#fff; font-size:.8rem; color:#222; }
  .search-input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(184,134,11,.15); }
  .search-ic{ position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--gray); font-size:.8rem; pointer-events:none; }
  .search-results{ position:absolute; top:calc(100% + 4px); left:0; width:340px; max-width:86vw; background:#fff; border:1px solid #222; max-height:60vh; overflow-y:auto; z-index:120; display:none; }
  .sr-item{ padding:12px 14px; border-bottom:1px solid var(--hair); }
  .sr-item:last-child{ border-bottom:none; }
  .sr-cat{ font-size:.6rem; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; margin-bottom:4px; color:var(--accent); }
  .sr-title{ font-weight:700; font-size:1.02rem; color:#222; }
  .sr-links{ font-size:.58rem; letter-spacing:.8px; text-transform:uppercase; color:var(--gray); margin-top:5px; }
  .sr-links a:hover{ color:var(--accent); }
  .sr-none{ padding:16px 14px; font-size:.82rem; color:var(--gray); }

  .tab{ display:inline-block; background:#222; color:#fff; font-weight:700; font-size:.66rem; letter-spacing:2px; text-transform:uppercase; padding:6px 12px; }

  .page-head{ max-width:90%; margin:0 auto; padding:28px 28px 6px; }
  .page-head .tab{ margin-bottom:14px; }
  .page-head h1{ font-size:2.6rem; font-weight:900; line-height:1.04; letter-spacing:-.005em; }
  .page-head p{ color:var(--gray); max-width:78ch; margin-top:10px; }

  .listwrap{ max-width:90%; margin:0 auto; padding:18px 28px 44px; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; grid-auto-rows:1fr; border-top:1px solid var(--hair); }
  .card{ display:flex; flex-direction:column; padding:24px 26px; border-right:1px solid var(--hair); border-bottom:1px solid var(--hair); }
  .card:nth-child(2n){ border-right:none; }
  .card-tag{ font-size:.58rem; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
  .card h3{ font-size:1.2rem; font-weight:700; line-height:1.16; }
  .card p{ font-size:.93rem; color:#444; margin-top:6px; }
  .links{ font-size:.58rem; letter-spacing:1px; text-transform:uppercase; margin-top:auto; padding-top:16px; color:var(--gray); }
  .links a:hover{ color:var(--accent); }

  .pager{ display:flex; align-items:center; gap:8px; margin-top:26px; flex-wrap:wrap; }
  .pg-btn{ font-family:Arial, Helvetica, sans-serif; font-size:.62rem; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; padding:10px 16px; border:1px solid var(--hair); background:#fff; color:#222; cursor:pointer; }
  .pg-btn:hover:not(:disabled){ border-color:var(--accent); color:var(--accent); }
  .pg-btn:disabled{ opacity:.4; cursor:default; }
  .pg-nums{ display:flex; gap:6px; }
  .pg-num{ min-width:36px; padding:10px 0; text-align:center; border:1px solid var(--hair); background:#fff; color:#222; font-size:.72rem; font-weight:700; cursor:pointer; }
  .pg-num:hover:not(.active){ border-color:var(--accent); color:var(--accent); }
  .pg-num.active{ background:#222; color:#fff; border-color:#222; }
  .pg-info{ font-size:.6rem; letter-spacing:1px; text-transform:uppercase; color:var(--gray); margin-top:14px; }

  footer{ background:#222; max-width:90%; margin:30px auto 0; padding:24px 28px; font-size:.8rem; letter-spacing:.5px; color:#fff; text-align:center; }

  .drawer{ position:fixed; top:0; left:-300px; width:280px; height:100vh; background:#fff; z-index:200; box-shadow:2px 0 14px rgba(0,0,0,.15); transition:left .28s ease; padding:74px 26px 26px; }
  .drawer.open{ left:0; }
  .drawer a{ display:block; font-size:.82rem; letter-spacing:1.2px; text-transform:uppercase; padding:14px 0; border-bottom:1px solid var(--hair); }
  .overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:150; }
  .overlay.open{ display:block; }
  .drawer-close{ position:absolute; top:20px; right:20px; font-size:1.4rem; background:none; border:none; cursor:pointer; }

  @media (max-width:760px){
    .grid{ grid-template-columns:1fr; }
    .card{ border-right:none; }
    .mast-nav{ display:none; }
    .hamburger{ display:flex; }
    .masthead{ padding:12px 16px; }
    .mast-left{ gap:10px; min-width:0; flex:1; }
    .logo{ font-size:.72rem; letter-spacing:1.5px; padding:6px 8px; }
    .search-box{ flex:1; width:auto; min-width:0; }
    .search-results{ position:fixed; top:58px; left:12px; right:12px; width:auto; max-width:none; }
    .page-head h1{ font-size:2rem; }
  }
</style>

  </nav>

  <div class="masthead">
    <div class="mast-left">
      <button class="hamburger" id="hamburger" aria-label="Open menu"><span></span><span></span><span></span></button>
      <a class="logo" href="/data-analyst-portfolio/index.html">DATA STORIES LAB</a>
      <nav class="mast-nav"><a href="/data-analyst-portfolio/case-studies.html">Case Studies</a><a href="/data-analyst-portfolio/interactive-dashboard.html">Dashboards</a><a href="/data-analyst-portfolio/ai-assistant.html">AI Assistants</a><a href="/data-analyst-portfolio/about-this-work.html">About</a><a href="/data-analyst-portfolio/contact.html">Contact</a></nav>
      <div class="search-box">
        <input type="text" class="search-input" id="searchInput" autocomplete="off" placeholder="Search AI assistants..." aria-label="Search AI assistants">
        <span class="search-ic">&#128269;</span>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
  </div>
  <hr class="rule-top">

  <div class="page-head">
    <span class="tab">AI Assistants</span>
    <h1>AI Assistants</h1>
    <p>Ask plain questions and get answers from the data.</p>

    </div>
    <div class="pg-info" id="pgInfo"></div>

<script>
  const ALL = [{"name": "Before They Leave", "cat": "Predictive Modeling", "desc": "Support calls and inactivity flag who will leave", "ai": "/data-analyst-portfolio/agentic_workflow/before-they-leave.html", "dash": "/data-analyst-portfolio/dashboards/before-they-leave-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/before-they-leave.html"}, {"name": "Beyond the Price Tag", "cat": "Regression Analysis", "desc": "Find what really earns a good review", "ai": "/data-analyst-portfolio/agentic_workflow/beyond-the-price-tag.html", "dash": "/data-analyst-portfolio/dashboards/beyond-the-price-tag-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/beyond-the-price-tag.html"}, {"name": "Cheap Stocks Worth Exploring", "cat": "Segmentation Analysis", "desc": "Find cheap stocks that pay safe dividends", "ai": "/data-analyst-portfolio/agentic_workflow/cheap-stocks-worth-exploring.html", "dash": "/data-analyst-portfolio/dashboards/cheap-stocks-worth-exploring-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/cheap-stocks-worth-exploring.html"}, {"name": "Evaluating Store Customer Experience", "cat": "Optimization Analysis", "desc": "Find which stores hurt your customer experience", "ai": "/data-analyst-portfolio/agentic_workflow/evaluating-customer-experience.html", "dash": "/data-analyst-portfolio/dashboards/evaluating-customer-experience-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/evaluating-customer-experience.html"}, {"name": "Finding Profit Drivers", "cat": "Optimization Analysis", "desc": "Find which products actually drive your profit", "ai": "/data-analyst-portfolio/agentic_workflow/finding-profit-drivers.html", "dash": "/data-analyst-portfolio/dashboards/finding-profit-drivers-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/finding-profit-drivers.html"}, {"name": "Finding Which Campaigns Work", "cat": "Optimization Analysis", "desc": "Find which marketing campaigns actually lift sales", "ai": "/data-analyst-portfolio/agentic_workflow/finding-which-campaigns-work.html", "dash": "/data-analyst-portfolio/dashboards/finding-which-campaigns-work-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/finding-which-campaigns-work.html"}, {"name": "Fixing the Sales Leaks", "cat": "Optimization Analysis", "desc": "Find where your online store loses buyers", "ai": "/data-analyst-portfolio/agentic_workflow/fixing-the-sales-leaks.html", "dash": "/data-analyst-portfolio/dashboards/fixing-the-sales-leaks-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/fixing-the-sales-leaks.html"}, {"name": "From Clicks to Check-Ins", "cat": "Segmentation Analysis", "desc": "Find which travelers actually book, and why", "ai": "/data-analyst-portfolio/agentic_workflow/from-clicks-to-check-ins.html", "dash": "/data-analyst-portfolio/dashboards/from-clicks-to-check-ins-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/from-clicks-to-check-ins.html"}, {"name": "From Ratings to Revenue", "cat": "Regression Analysis", "desc": "See how customer ratings turn into sales", "ai": "/data-analyst-portfolio/agentic_workflow/from-ratings-to-revenue.html", "dash": "/data-analyst-portfolio/dashboards/from-ratings-to-revenue-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/from-ratings-to-revenue.html"}, {"name": "Know When to Reorder", "cat": "Time Series Analysis", "desc": "Reorder stock in time to stop losing sales", "ai": "/data-analyst-portfolio/agentic_workflow/know-when-to-reorder.html", "dash": "/data-analyst-portfolio/dashboards/know-when-to-reorder-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/know-when-to-reorder.html"}, {"name": "Know Your Reseller", "cat": "Segmentation Analysis", "desc": "Find which resellers actually earn their margin", "ai": "/data-analyst-portfolio/agentic_workflow/know-your-reseller.html", "dash": "/data-analyst-portfolio/dashboards/know-your-reseller-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/know-your-reseller.html"}, {"name": "Not All Homes Are Equal", "cat": "Regression Analysis", "desc": "Find the best-value property type and size", "ai": "/data-analyst-portfolio/agentic_workflow/not-all-homes-are-equal.html", "dash": "/data-analyst-portfolio/dashboards/not-all-homes-are-equal-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/not-all-homes-are-equal.html"}, {"name": "Predicting Gym Member Drop-Off", "cat": "Predictive Modeling", "desc": "Spot gym members losing motivation before they quit", "ai": "/data-analyst-portfolio/agentic_workflow/predicting-gym-member-dropout.html", "dash": "/data-analyst-portfolio/dashboards/predicting-gym-member-dropout-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/predicting-gym-member-dropout.html"}, {"name": "Predicting Holiday Peaks", "cat": "Time Series Analysis", "desc": "Start holiday campaigns right before demand peaks", "ai": "/data-analyst-portfolio/agentic_workflow/predicting-holiday-peaks.html", "dash": "/data-analyst-portfolio/dashboards/predicting-holiday-peaks-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/predicting-holiday-peaks.html"}, {"name": "Predicting Sales Cycles", "cat": "Time Series Analysis", "desc": "Plan ahead for your busy and slow weeks", "ai": "/data-analyst-portfolio/agentic_workflow/predicting-sales-cycles.html", "dash": "/data-analyst-portfolio/dashboards/Predicting%20Sales%20Cycles.html", "cs": "/data-analyst-portfolio/case-studies/predicting-sales-cycles.html"}, {"name": "Right Price, Right Season", "cat": "Optimization Analysis", "desc": "Price each Airbnb listing right for each season", "ai": "/data-analyst-portfolio/agentic_workflow/right-price-right-season.html", "dash": "/data-analyst-portfolio/dashboards/right-price-right-season-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/right-price-right-season.html"}, {"name": "Selling the Right Products", "cat": "Optimization Analysis", "desc": "Focus selling on the few products that profit", "ai": "/data-analyst-portfolio/agentic_workflow/selling-the-right-products.html", "dash": "/data-analyst-portfolio/dashboards/selling-the-right-products-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/selling-the-right-products.html"}, {"name": "Under the Kopi Lid", "cat": "Time Series Analysis", "desc": "See how fast revenue and profit really grew", "ai": "/data-analyst-portfolio/agentic_workflow/oriental-kopi-pl-analysis.html", "dash": "/data-analyst-portfolio/dashboards/oriental-kopi-pl-analysis-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/oriental-kopi-pl-analysis.html"}, {"name": "Understanding Customer Value", "cat": "Segmentation Analysis", "desc": "Find which customers truly drive your profit", "ai": "/data-analyst-portfolio/agentic_workflow/understanding-customer-value.html", "dash": "/data-analyst-portfolio/dashboards/understanding-customer-value-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/understanding-customer-value.html"}, {"name": "What Causes Product Returns", "cat": "Regression Analysis", "desc": "Find what makes products get returned", "ai": "/data-analyst-portfolio/agentic_workflow/what-causes-product-returns.html", "dash": "/data-analyst-portfolio/dashboards/what-causes-product-returns-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/what-causes-product-returns.html"}, {"name": "Where Are Your High-Value Customers?", "cat": "Segmentation Analysis", "desc": "Find which channels bring high-value customers", "ai": "/data-analyst-portfolio/agentic_workflow/high-value-customers.html", "dash": "/data-analyst-portfolio/dashboards/high-value-customers-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/high-value-customers.html"}, {"name": "Where Revenue Comes From", "cat": "Predictive Modeling", "desc": "See which products and customers actually drive revenue", "ai": "/data-analyst-portfolio/agentic_workflow/where-revenue-comes-from.html", "dash": "/data-analyst-portfolio/dashboards/where-revenue-comes-from-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/where-revenue-comes-from.html"}, {"name": "Where the Money Is", "cat": "Segmentation Analysis", "desc": "See which products and regions drive revenue", "ai": "/data-analyst-portfolio/agentic_workflow/where-the-money-is.html", "dash": "/data-analyst-portfolio/dashboards/where-the-money-is-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/where-the-money-is.html"}, {"name": "Where Value Comes From", "cat": "Optimization Analysis", "desc": "See which customers and offers create lasting value", "ai": "/data-analyst-portfolio/agentic_workflow/where-value-comes-from.html", "dash": "/data-analyst-portfolio/dashboards/where-value-comes-from-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/where-value-comes-from.html"}, {"name": "Which Channel Finds Your Tenant", "cat": "Optimization Analysis", "desc": "Find which channel actually signs your tenants", "ai": "/data-analyst-portfolio/agentic_workflow/which-channel-finds-your-tenant.html", "dash": "/data-analyst-portfolio/dashboards/which-channel-finds-your-tenant-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/which-channel-finds-your-tenant.html"}, {"name": "Who Really Drives Sales?", "cat": "Segmentation Analysis", "desc": "Find which live sellers actually drive sales", "ai": "/data-analyst-portfolio/agentic_workflow/who-really-drives-sales.html", "dash": "/data-analyst-portfolio/dashboards/who-really-drives-sales-dashboard.html", "cs": "/data-analyst-portfolio/case-studies/who-really-drives-sales.html"}];
  const PER = 8;                 // 2 columns x 4 rows
  const pages = Math.max(1, Math.ceil(ALL.length / PER));
  let page = 1;
  const esc = (s) => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const grid = document.getElementById('grid');

  const card = (p) =>
    `<article class="card">`+
      `<div class="card-tag">${esc(p.cat)}</div>`+
      `<a href="${p.ai}"><h3>${esc(p.name)}</h3></a>`+
      `<p>${esc(p.desc)}</p>`+
      `<div class="links"><a href="${p.ai}">AI Assistant</a> &middot; <a href="${p.dash}">Dashboard</a> &middot; <a href="${p.cs}">Case Study</a></div>`+
    `</article>`;

  function render(){
    const start = (page-1)*PER;
    const slice = ALL.slice(start, start+PER);
    grid.innerHTML = slice.map(card).join('');
    document.getElementById('pgNums').innerHTML =
      Array.from({length:pages}, (_,i) =>
        `<button class="pg-num${i+1===page?' active':''}" data-p="${i+1}">${i+1}</button>`).join('');
    document.getElementById('prev').disabled = page===1;
    document.getElementById('next').disabled = page===pages;
    const end = Math.min(start+PER, ALL.length);
    document.getElementById('pgInfo').textContent =
      `Showing ${ALL.length?start+1:0}\u2013${end} of ${ALL.length} assistants`;
  }
  function go(n){ page = Math.min(Math.max(1,n), pages); render();
    document.querySelector('.listwrap').scrollIntoView({behavior:'smooth', block:'start'}); }
  document.getElementById('prev').onclick = () => go(page-1);
  document.getElementById('next').onclick = () => go(page+1);
  document.getElementById('pgNums').addEventListener('click', e => {
    const b = e.target.closest('.pg-num'); if(b) go(+b.dataset.p);
  });
  render();

  // masthead search over every assistant
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  function runSearch(q){
    if(q.trim().length < 2){ searchResults.style.display='none'; return; }
    const ql = q.toLowerCase();
    const hits = ALL.filter(p => (p.name+' '+p.cat+' '+p.desc).toLowerCase().includes(ql));
    searchResults.innerHTML = hits.length ? hits.map(p =>
      `<div class="sr-item"><div class="sr-cat">${esc(p.cat)}</div>`+
      `<a href="${p.ai}"><div class="sr-title">${esc(p.name)}</div></a>`+
      `<div class="sr-links"><a href="${p.ai}">AI Assistant</a> &middot; <a href="${p.dash}">Dashboard</a> &middot; <a href="${p.cs}">Case Study</a></div></div>`).join('')
      : `<div class="sr-none">No assistants found. Try a different keyword.</div>`;
    searchResults.style.display='block';
  }
  searchInput.addEventListener('input', e => runSearch(e.target.value));
  document.addEventListener('click', e => { if(!e.target.closest('.search-box')) searchResults.style.display='none'; });

  // drawer
  const drawer=document.getElementById('drawer'), overlay=document.getElementById('overlay');
  const openMenu=()=>{ drawer.classList.add('open'); overlay.classList.add('open'); };
  const closeMenu=()=>{ drawer.classList.remove('open'); overlay.classList.remove('open'); };
  document.getElementById('hamburger').addEventListener('click', openMenu);
  document.getElementById('drawerClose').addEventListener('click', closeMenu);
  overlay.addEventListener('click', closeMenu);
  drawer.querySelectorAll('a').forEach(a=>a.addEventListener('click', closeMenu));
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeMenu(); searchResults.style.display='none'; }});
</script>
</body>
