    <style>
        :root {

            --navy-dark: #111526;
            --gold: #C9A84C;
            --gold-soft: #D4B660;
            --cream: #FAF6EE;
            --cream-alt: #F2EDE0;
            --text: #2A2F4A;
            --text-soft: #5A5F7A;
            --border: #E5DFD0;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: var(--cream);
            line-height: 1.65;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Topbar (lyven81.github.io hub aesthetic) ── */
        .topbar {
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cream);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .brand {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--navy);
            letter-spacing: 0.01em;
        }
        .brand a { color: inherit; text-decoration: none; }
        .topnav { display: flex; gap: 1.8rem; }
        .topnav a {
            color: var(--text-soft);
            text-decoration: none;
            font-size: 0.86rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }
        .topnav a:hover { color: var(--navy); }

        /* ── Search section ── */
        .search-section {
            background: var(--cream);
            padding: 1.4rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
        }
        .search-container {
            position: relative;
            width: 100%;
            max-width: 520px;
        }
        .search-input {
            width: 100%;
            padding: 12px 44px 12px 18px;
            border: 1px solid var(--border);
            border-radius: 2px;
            font-size: 0.92rem;
            font-family: inherit;
            background: #fff;
            color: var(--text);
            transition: border-color 0.2s ease;
        }
        .search-input::placeholder { color: var(--text-soft); }
        .search-input:focus {
            outline: none;
            border-color: var(--gold);
        }
        .search-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-soft);
            pointer-events: none;
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid var(--border);
            box-shadow: 0 12px 28px rgba(26,31,58,0.08);
            max-height: 400px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            margin-top: 6px;
        }
        .search-result-item {
            padding: 14px 18px;
            border-bottom: 1px solid var(--cream-alt);
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        .search-result-item:hover { background-color: var(--cream-alt); }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-category {
            font-size: 0.66rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .search-result-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 4px;
            font-size: 1rem;
        }
        .search-result-description {
            color: var(--text-soft);
            font-size: 0.84rem;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .search-result-buttons { display: flex; gap: 8px; }
        .search-result-btn {
            padding: 5px 12px;
            border: 1px solid var(--border);
            background: var(--cream);
            color: var(--navy);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        .search-result-btn:hover {
            background: var(--navy);
            color: var(--cream);
            border-color: var(--navy);
        }
        .no-results {
            padding: 22px;
            text-align: center;
            color: var(--text-soft);
            font-style: italic;
        }
        .search-overlay {

            z-index: 99;
            display: none;

</head>

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const searchOverlay = document.getElementById('searchOverlay');

function performSearch(query) {
    if (query.length < 2) {
        searchResults.style.display = 'none';
        searchOverlay.style.display = 'none';
        return;
    }
    const filtered = aiAssistants.filter(s =>
        s.title.toLowerCase().includes(query.toLowerCase()) ||
        s.description.toLowerCase().includes(query.toLowerCase()) ||
        s.category.toLowerCase().includes(query.toLowerCase())
    );
    displayResults(filtered);
}

function displayResults(results) {
    if (results.length === 0) {
        searchResults.innerHTML = '<div class="no-results">No AI assistants found.</div>';
    } else {
        searchResults.innerHTML = results.map(s => `
            <div class="search-result-item">
                <div class="search-result-category">${s.category}</div>
                <div class="search-result-title">${s.title}</div>
                <div class="search-result-description">${s.description}</div>
                <div class="search-result-buttons">
                    <a href="${s.agenticUrl}" class="search-result-btn">AI Assistant</a>
                    <a href="${s.dashboardUrl}" class="search-result-btn">Dashboard</a>
                    <a href="${s.caseStudyUrl}" class="search-result-btn">Case Study</a>
                </div>
            </div>
        `).join('');
    }
    searchResults.style.display = 'block';
    searchOverlay.style.display = 'block';
}

function hideResults() {
    searchResults.style.display = 'none';
    searchOverlay.style.display = 'none';
}

searchInput.addEventListener('input', e => performSearch(e.target.value));
searchInput.addEventListener('focus', () => { if (searchInput.value.length >= 2) performSearch(searchInput.value); });
searchOverlay.addEventListener('click', hideResults);
document.addEventListener('click', e => { if (!e.target.closest('.search-container')) hideResults(); });
searchResults.addEventListener('click', e => e.stopPropagation());
document.addEventListener('keydown', e => { if (e.key === 'Escape') { hideResults(); searchInput.blur(); } });

const PER_PAGE = 8;
let currentPage = 1;

function renderTable(studies) {
    const table = document.getElementById('aiAssistantsTable');
    const sorted = [...studies].sort((a, b) => a.title.localeCompare(b.title));
    const totalPages = Math.max(1, Math.ceil(sorted.length / PER_PAGE));
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    const startIdx = (currentPage - 1) * PER_PAGE;
    const pageStudies = sorted.slice(startIdx, startIdx + PER_PAGE);
    let html = '';
    for (let i = 0; i < pageStudies.length; i += 2) {
        html += '<tr>';
        const left = pageStudies[i];
        html += `
            <td>
                <div class="card-tag">${left.category}</div>
                <h3><a href="${left.caseStudyUrl}">${left.title}</a></h3>
                <p>${left.description}</p>
                <div class="case-study-links"><a href="${left.agenticUrl}">AI Assistant</a></div>
            </td>
        `;
        if (i + 1 < pageStudies.length) {
            const right = pageStudies[i + 1];
            html += `
                <td>
                    <div class="card-tag">${right.category}</div>
                    <h3><a href="${right.caseStudyUrl}">${right.title}</a></h3>
                    <p>${right.description}</p>
                    <div class="case-study-links"><a href="${right.agenticUrl}">AI Assistant</a></div>
                </td>
            `;
        } else {
            html += '<td></td>';
        }
        html += '</tr>';
    }
    table.innerHTML = html;
    renderPagination(totalPages, sorted.length);
}

function renderPagination(totalPages, totalCount) {
    let el = document.getElementById('pagination');
    if (!el) {
        el = document.createElement('div');
        el.id = 'pagination';
        el.className = 'pagination';
        document.getElementById('aiAssistantsTable').insertAdjacentElement('afterend', el);
    }
    let info = document.getElementById('page-info');
    if (!info) {
        info = document.createElement('div');
        info.id = 'page-info';
        info.className = 'page-info';
        el.insertAdjacentElement('afterend', info);
    }
    if (totalPages <= 1) { el.innerHTML = ''; info.textContent = totalCount + ' AI assistants'; return; }
    let h = '<button class="page-link" ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage - 1) + ')">Prev</button>';
    for (let p = 1; p <= totalPages; p++) {
        h += '<button class="page-link ' + (p === currentPage ? 'active' : '') + '" onclick="goToPage(' + p + ')">' + p + '</button>';
    }
    h += '<button class="page-link" ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage + 1) + ')">Next</button>';
    el.innerHTML = h;
    const from = (currentPage - 1) * PER_PAGE + 1;
    const to = Math.min(currentPage * PER_PAGE, totalCount);
    info.textContent = 'Showing ' + from + '-' + to + ' of ' + totalCount + ' AI assistants';
}

function goToPage(p) {
    currentPage = p;
    renderTable(aiAssistants);
    document.getElementById('aiAssistantsTable').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.addEventListener('DOMContentLoaded', () => renderTable(aiAssistants));
</script>
